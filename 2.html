<!DOCTYPE html>
<html>
<head>
<title>JS Assignment UI</title>
<style>
body{
font-family:Arial;
padding:20px;
background:#f5f6fa;
}
.container{
background:white;
padding:20px;
margin-bottom:20px;
border-radius:8px;
box-shadow:0 0 5px rgba(0,0,0,0.1);
}
button{
margin-top:10px;
padding:8px 15px;
cursor:pointer;
}
input,select{
padding:5px;
margin:5px 0;
}
</style>
</head>
<body>

<h1>JS Assignment</h1>

<div class="container">
<h3>Q1: Even Numbers (1-100)</h3>
<button onclick="showEven()">Show</button>
<p id="evenOutput"></p>
</div>

<div class="container">
<h3>Q2: Calculator</h3>
<input id="num1" placeholder="Enter number 1">
<input id="num2" placeholder="Enter number 2">
<select id="op">
<option value="+">+</option>
<option value="-">-</option>
<option value="*">*</option>
<option value="/">/</option>
</select>
<button onclick="calc()">Calculate</button>
<p id="calcOutput"></p>
</div>

<div class="container">
<h3>Q3: Tax Calculator</h3>
<input id="salary" placeholder="Enter salary">
<button onclick="taxCalc()">Find Tax</button>
<p id="taxOutput"></p>
</div>

<div class="container">
<h3>Q4: Sum of Products</h3>
<input id="n1" placeholder="Enter n1">
<input id="n2" placeholder="Enter n2">
<button onclick="sumProd()">Calculate</button>
<p id="prodOutput"></p>
</div>

<script>

// Q1
function showEven(){
let res="";
for(let i=1;i<=100;i++){
if(i%2===0){
res+=i+" ";
}
}
document.getElementById("evenOutput").innerText=res;
}

// Q2
function calc(){
let a=Number(document.getElementById("num1").value);
let b=Number(document.getElementById("num2").value);
let op=document.getElementById("op").value;
let result;
switch(op){
case '+': result=a+b; break;
case '-': result=a-b; break;
case '*': result=a*b; break;
case '/': result=b!==0?a/b:"Cannot divide by zero"; break;
default: result="Invalid";
}
document.getElementById("calcOutput").innerText=result;
}

// Q3
function taxCalc(){
let salary=Number(document.getElementById("salary").value);
let tax=0;
switch(true){
case (salary>0 && salary<=500000): tax=0; break;
case (salary<=1000000): tax=salary*0.1; break;
case (salary<=1500000): tax=salary*0.2; break;
case (salary>1500000): tax=salary*0.3; break;
default: tax="Invalid";
}
document.getElementById("taxOutput").innerText=tax;
}

// Q4
function sumProd(){
let n1=Number(document.getElementById("n1").value);
let n2=Number(document.getElementById("n2").value);
let sum=0;
while(n1>0 || n2>0){
let d1=n1%10;
let d2=n2%10;
sum+=d1*d2;
n1=Math.floor(n1/10);
n2=Math.floor(n2/10);
}
document.getElementById("prodOutput").innerText=sum;
}

</script>

</body>
</html>
